<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Download</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --border:   #334155;
      --accent:   #38bdf8;
      --accent2:  #0ea5e9;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --success:  #4ade80;
      --radius:   14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Floating orb background ── */
    body::before {
      content: '';
      position: fixed;
      top: -160px; left: -160px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -160px; right: -160px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-width: 480px;
      width: 100%;
      padding: 40px 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    /* ── Icon ── */
    .icon-wrap {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 8px 20px rgba(56,189,248,0.3);
    }
    .icon-wrap svg { width: 28px; height: 28px; fill: #fff; }

    /* ── Title ── */
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
      color: var(--text);
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── File info box ── */
    .file-info {
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .info-row .label {
      color: var(--muted);
      min-width: 90px;
      font-weight: 500;
    }
    .info-row .value {
      color: var(--text);
      font-weight: 500;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.3);
      color: var(--success);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 24px;
    }

    /* ── Download button ── */
    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border-radius: 10px;
      text-decoration: none;
      letter-spacing: 0.2px;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 6px 20px rgba(56,189,248,0.35);
    }
    .btn-download:hover  { opacity: 0.9; transform: translateY(-1px); }
    .btn-download:active { opacity: 1;   transform: translateY(0); }
    .btn-download svg { width: 18px; height: 18px; fill: #fff; flex-shrink: 0; }

    /* ── Footer note ── */
    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 20px;
    }

    @media (max-width: 500px) {
      .card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Icon -->
    <div class="icon-wrap">
      <!-- ZIP / archive icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM12 18a1 1 0 1 1 0-2 1 1 0 0 1 0 2zm1-4h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V4h2v2z"/>
      </svg>
    </div>

    <!-- Title -->
    <h1>Project File Download</h1>
    <p class="subtitle">The latest version of the project package is ready. Click the button below to download it to your device.</p>

    <!-- File metadata -->
    <div class="file-info">
      <div class="info-row">
        <span class="label">File name</span>
        <!-- ✏️ CHANGE: replace with your actual filename -->
        <span class="value">project-package.zip</span>
      </div>
      <div class="info-row">
        <span class="label">Last updated</span>
        <!-- ✏️ CHANGE: update this date whenever you upload a new zip -->
        <span class="value" id="updated-date">25 June 2025</span>
      </div>
      <div class="info-row">
        <span class="label">Status</span>
        <span class="badge">
          <!-- green dot -->
          <svg width="7" height="7" viewBox="0 0 7 7" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="3.5" cy="3.5" r="3.5" fill="#4ade80"/>
          </svg>
          Latest version
        </span>
      </div>
    </div>

    <hr class="divider"/>

    <!-- Download button -->
    <!-- ✏️ CHANGE: replace "project-package.zip" with your actual filename -->
    <a class="btn-download" href="project-package.zip" download>
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/>
      </svg>
      Download File
    </a>

    <p class="footer-note">Hosted on GitHub Pages &mdash; file available for direct download.</p>
  </div>

</body>
</html>
